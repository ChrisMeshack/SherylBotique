<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Sheryl Boutique Admin</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .dashboard { padding: 2rem; max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #F6E3EA; padding-bottom: 1rem; margin-bottom: 2rem; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: white; padding: 2rem; border-radius: 15px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .stat-card h3 { color: #8F5571; font-size: 2rem; }
        .btn { background: #8F5571; color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 8px; cursor: pointer; transition: 0.3s; font-family: 'Outfit'; }
        .btn:hover { background: #73435b; }
        .danger { background: #d9534f; }
        .danger:hover { background: #c9302c; }
        .top-action { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #F6E3EA; color: #8F5571; }
        .out-stock { color: #d9534f; font-weight: bold; }
        .in-stock { color: #5cb85c; font-weight: bold; }
        
        /* Modal */
        .admin-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .admin-modal.active { display: flex; }
        .admin-modal-content { background: white; padding: 2rem; border-radius: 10px; width: 400px; max-width: 90%; }
        .admin-modal-content h3 { margin-top: 0; color: #8F5571; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; }
        .form-group input, .form-group select { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h2>Welcome Admin</h2>
            <div>
                <a href="/" class="btn" style="text-decoration:none; margin-right:10px;">View Shop</a>
                <button class="btn danger" id="logout-btn">Logout</button>
            </div>
        </div>

        <div class="stats">
            <div class="stat-card">
                <p>Total Products</p>
                <h3 id="product-count">0</h3>
            </div>
            <div class="stat-card">
                <p>Out of Stock</p>
                <h3 id="oos-count">0</h3>
            </div>
        </div>

        <div class="top-action">
            <h3>Manage Products</h3>
            <button class="btn" onclick="openProductModal()">+ Add New Product</button>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Image</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="admin-product-table">
                <!-- Loaded via JS -->
            </tbody>
        </table>
    </div>

    <!-- Product Modal -->
    <div class="admin-modal" id="product-modal">
        <div class="admin-modal-content">
            <h3 id="modal-title">Add Product</h3>
            <form id="product-form">
                <input type="hidden" id="prod-id">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="prod-name" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="prod-desc" rows="3" style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 5px;"></textarea>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="prod-category" required>
                        <option value="Men">Men</option>
                        <option value="Women">Women</option>
                        <option value="Kids">Kids</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Price (KSH)</label>
                    <input type="number" id="prod-price" required>
                </div>
                <div class="form-group">
                    <label>In Stock</label>
                    <select id="prod-stock">
                        <option value="true">Yes (In Stock)</option>
                        <option value="false">No (Out of Stock)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Image Upload</label>
                    <input type="file" id="prod-image" accept="image/*">
                    <small style="color:#666;">Leave empty to keep existing image</small>
                </div>
                <div style="display:flex; justify-content: flex-end; gap: 10px; margin-top: 1rem;">
                    <button type="button" class="btn danger" onclick="closeProductModal()">Cancel</button>
                    <button type="submit" class="btn">Save Product</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('logout-btn').addEventListener('click', async () => {
            await fetch('/api/admin/logout', { method: 'POST' });
            window.location.reload();
        });

        let products = [];

        async function loadAdminData() {
            const res = await fetch('/api/products');
            products = await res.json();
            
            document.getElementById('product-count').innerText = products.length;
            document.getElementById('oos-count').innerText = products.filter(p => p.inStock === false).length;
            
            const tbody = document.getElementById('admin-product-table');
            tbody.innerHTML = '';
            products.forEach(p => {
                const stockStatus = p.inStock === false ? '<span class="out-stock">Out of Stock</span>' : '<span class="in-stock">In Stock</span>';
                tbody.innerHTML += `
                    <tr>
                        <td>#${p.id}</td>
                        <td><img src="${p.image.startsWith('http') || p.image.startsWith('data:') ? p.image : '/' + p.image}" onerror="this.onerror=null; this.src='https://via.placeholder.com/50?text=NA';" width="50" style="border-radius:5px; height:50px; object-fit:cover;"></td>
                        <td>${p.name}</td>
                        <td>${p.category}</td>
                        <td>KSH ${p.price.toLocaleString()}</td>
                        <td>${stockStatus}</td>
                        <td>
                            <button class="btn" style="padding: 0.4rem; font-size: 0.9rem;" onclick="editProduct(${p.id})"><i class="fas fa-edit"></i></button>
                            <button class="btn danger" style="padding: 0.4rem; font-size: 0.9rem;" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });
        }

        const modal = document.getElementById('product-modal');
        const form = document.getElementById('product-form');

        function openProductModal() {
            document.getElementById('modal-title').innerText = "Add Product";
            form.reset();
            document.getElementById('prod-id').value = "";
            document.getElementById('prod-desc').value = "";
            modal.classList.add('active');
        }

        function closeProductModal() {
            modal.classList.remove('active');
        }

        function editProduct(id) {
            const p = products.find(prod => prod.id === id);
            if (!p) return;
            document.getElementById('modal-title').innerText = "Edit Product";
            document.getElementById('prod-id').value = p.id;
            document.getElementById('prod-name').value = p.name;
            document.getElementById('prod-desc').value = p.description || "";
            document.getElementById('prod-category').value = p.category;
            document.getElementById('prod-price').value = p.price;
            document.getElementById('prod-stock').value = p.inStock === false ? "false" : "true";
            modal.classList.add('active');
        }

        async function deleteProduct(id) {
            if (confirm("Are you sure you want to delete this product?")) {
                await fetch(`/api/products/${id}`, { method: 'DELETE' });
                loadAdminData();
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('prod-id').value;
            const formData = new FormData();
            formData.append('name', document.getElementById('prod-name').value);
            formData.append('description', document.getElementById('prod-desc').value);
            formData.append('category', document.getElementById('prod-category').value);
            formData.append('price', document.getElementById('prod-price').value);
            formData.append('inStock', document.getElementById('prod-stock').value);
            
            const fileInput = document.getElementById('prod-image');
            if(fileInput.files[0]) {
                formData.append('image', fileInput.files[0]);
            }

            const url = id ? `/api/products/${id}` : '/api/products';
            const method = id ? 'PUT' : 'POST';

            await fetch(url, {
                method: method,
                body: formData
            });

            closeProductModal();
            loadAdminData();
        });

        loadAdminData();
    </script>
</body>
</html>
