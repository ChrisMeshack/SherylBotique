<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Sheryl Boutique</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .auth-container { display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #FFF7FB; padding: 2rem;}
        .auth-box { background: white; padding: 3rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 450px; text-align: center; border: 1px solid rgba(231, 217, 255, 0.4);}
        .auth-box h2 { color: #8F5571; margin-bottom: 0.5rem; }
        .auth-box p { color: #666; margin-bottom: 2rem; font-size: 0.9rem; }
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: bold; color: #333;}
        .form-group input { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; font-family: 'Outfit'; }
        .auth-btn { width: 100%; background: #8F5571; color: white; padding: 1rem; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem;}
        .auth-btn:hover { background: #73435b; }
        .message { margin-top: 1rem; padding: 0.5rem; border-radius: 5px; display: none; font-size: 0.9rem; }
        .error { color: #d9534f; background: #fdf2f2; }
        .success { color: #5cb85c; background: #f0fdf0; }
        .toggle-links { margin-top: 2rem; font-size: 0.9rem; }
        .toggle-links a { color: #8F5571; text-decoration: underline; cursor: pointer; display: block; margin-bottom: 0.5rem;}
        .toggle-links a:hover { color: #73435b; }
    </style>
</head>
<body>
    <div class="auth-container">
        
        <div class="auth-box" id="valid-view" style="display: none;">
            <h2>Choose New Password</h2>
            <p>Please enter a strong new password below.</p>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="reset-password" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="reset-confirm" placeholder="••••••••">
            </div>
            <button class="auth-btn" id="reset-btn" onclick="handleReset()">Update Password</button>
            <div class="message error" id="reset-error"></div>
            <div class="message success" id="reset-success"></div>
        </div>

        <div class="auth-box" id="invalid-view" style="display: none;">
            <h2>Invalid Link</h2>
            <p>Your password reset link is invalid or has expired.</p>
            <a href="/auth.html" class="auth-btn" style="display: inline-block; text-decoration:none; margin-top:1rem;">Back to Login</a>
        </div>

    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const email = urlParams.get('email');

        if (!token || !email) {
            document.getElementById('invalid-view').style.display = 'block';
        } else {
            document.getElementById('valid-view').style.display = 'block';
        }

        async function handleReset() {
            const password = document.getElementById('reset-password').value;
            const confirm = document.getElementById('reset-confirm').value;
            const errEl = document.getElementById('reset-error');
            const succEl = document.getElementById('reset-success');
            const btn = document.getElementById('reset-btn');
            
            errEl.style.display = 'none'; succEl.style.display = 'none';

            if(password.length < 6) {
                errEl.style.display = 'block'; errEl.innerText = "Password must be at least 6 characters.";
                return;
            }
            if(password !== confirm) {
                errEl.style.display = 'block'; errEl.innerText = "Passwords do not match!";
                return;
            }

            btn.disabled = true;
            btn.innerText = 'Updating...';

            const res = await fetch('/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, token, password })
            });
            const data = await res.json();
            
            btn.disabled = false;
            btn.innerText = 'Update Password';
            
            if(data.success) {
                succEl.style.display = 'block';
                succEl.innerText = "Password successfully updated! Redirecting to login...";
                setTimeout(() => window.location.href = '/auth.html', 2500);
            } else {
                errEl.style.display = 'block';
                errEl.innerText = data.message;
            }
        }
    </script>
</body>
</html>
